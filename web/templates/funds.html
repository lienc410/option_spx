<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funds · 基金清仓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400;1,6..72,600&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="{{ url_for('static', filename='theme_bootstrap.js') }}?v=funds1"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}?v=funds1">
<script src="{{ url_for('static', filename='theme.js') }}?v=funds1"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:14px; }
body { font-family:var(--f-ui); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.55; }

.nav { position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:50px;background:var(--nav-bg-strong);backdrop-filter:blur(12px);border-bottom:1px solid var(--border); }
.nav-brand { font-family:var(--f-display);font-size:1.05rem;color:var(--gold); }
.nav-brand em { font-style:italic; }
.nav-links { display:flex;gap:2px; }
.nav-link { font-size:0.76rem;padding:5px 10px;border-radius:5px;color:var(--text-2);text-decoration:none;transition:0.15s; }
.nav-link:hover { color:var(--text);background:var(--surface-hi); }
.nav-link.active { color:var(--gold);background:var(--gold-bg); }
.nav-right { font-family:var(--f-mono);font-size:0.65rem;color:var(--text-2); }

.page { max-width:880px;margin:0 auto;padding:28px 24px 60px; }
.page-hero { margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border); }
.page-hero h1 { font-family:var(--f-display);font-size:1.7rem;font-weight:400; }
.page-hero h1 em { font-style:italic;color:var(--text-2); }
.page-meta { font-family:var(--f-mono);font-size:0.65rem;color:var(--text-2);margin-top:6px; }

/* Account header strip */
.acct-strip { display:grid;grid-template-columns:repeat(3,1fr);gap:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px; }
.acct-cell {}
.acct-label { font-size:0.60rem;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;color:var(--text-2);margin-bottom:4px; }
.acct-value { font-family:var(--f-mono);font-size:1.05rem;color:var(--text); }
.acct-sub   { font-family:var(--f-mono);font-size:0.62rem;color:var(--text-2);margin-top:2px; }
.acct-regime { grid-column:1/-1;font-size:0.62rem;color:var(--text-2);padding-top:10px;border-top:1px solid var(--border);margin-top:4px; }

/* stale banner */
.stale-banner { background:var(--gold-bg);border:1px solid var(--gold-border,var(--gold));border-radius:7px;padding:8px 14px;font-size:0.62rem;color:var(--gold);margin-bottom:14px; }

/* section labels */
.section-label { font-size:0.60rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-2);margin:24px 0 10px; }

/* Fund table */
.fund-table { width:100%;border-collapse:collapse; }
.fund-table th { font-size:0.58rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-2);padding:5px 8px;text-align:right;border-bottom:1px solid var(--border); }
.fund-table th:first-child { text-align:left; }
.fund-table td { font-family:var(--f-mono);font-size:0.74rem;padding:8px 8px;border-bottom:1px solid var(--border);text-align:right;vertical-align:middle; }
.fund-table td:first-child { text-align:left;font-family:var(--f-ui); }
.fund-row { cursor:pointer;transition:background 0.12s; }
.fund-row:hover { background:var(--surface); }
.fund-row.expanded { background:var(--surface); }
.fund-name { font-size:0.80rem;color:var(--text); }
.fund-code { font-family:var(--f-mono);font-size:0.62rem;color:var(--text-2);margin-top:1px; }
.chev { display:inline-block;color:var(--text-2);font-size:0.7em;margin-right:5px;transition:transform 0.15s; }
.fund-row.expanded .chev { transform:rotate(90deg);color:var(--gold); }
.dot { display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle; }
.dot-fresh { background:var(--green); }
.dot-stale { background:var(--gold); }

/* action badge */
.action-badge { display:inline-block;font-size:0.62rem;font-family:var(--f-ui);padding:2px 8px;border-radius:9999px;white-space:nowrap; }
.ab-green { background:var(--green-bg);color:var(--green); }
.ab-gold  { background:var(--gold-bg);color:var(--gold); }
.ab-red   { background:var(--red-bg);color:var(--red); }
.ab-dim   { background:var(--surface-hi);color:var(--text-2); }

/* lock / veto badges */
.lock-badge { display:inline-block;font-size:0.58rem;margin-left:4px;color:var(--gold); }
.veto-badge { display:inline-block;font-size:0.58rem;margin-left:4px;color:var(--text-2);font-family:var(--f-ui); }

/* chart expander */
.fund-chart-row { display:none; }
.fund-chart-row.open { display:table-row; }
.fund-chart-cell { padding:14px 16px 18px;border-bottom:1px solid var(--border); }
.fund-chart-cell img { max-width:100%;border-radius:7px;border:1px solid var(--border); }
.chart-err { font-size:0.70rem;color:var(--text-2); }

/* error row */
.err-row td { color:var(--red);font-size:0.72rem;font-family:var(--f-ui); }

/* empty / unavailable */
.unavail { text-align:center;padding:60px 0;color:var(--text-2);font-size:0.80rem; }
.unavail code { font-family:var(--f-mono);font-size:0.70rem;color:var(--text);background:var(--surface);padding:2px 8px;border-radius:4px; }

/* disclaimer */
.disclaimer { font-size:0.60rem;color:var(--text-2);margin-top:32px;padding-top:14px;border-top:1px solid var(--border); }

/* signal status panel (expanded) */
.sig-panel { font-family:var(--f-ui);font-size:0.70rem;margin-bottom:14px; }
.sig-grid { display:grid;grid-template-columns:auto 1fr;gap:5px 16px;align-items:baseline; }
.sig-k { color:var(--text-2);font-size:0.58rem;text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap;text-align:left; }
.sig-v { color:var(--text);font-family:var(--f-mono);font-size:0.70rem;text-align:left; }
.sig-hit { background:var(--surface-hi);border-radius:6px;padding:7px 11px;margin:10px 0 4px;font-size:0.72rem;color:var(--text); }
.sig-watch { border-top:1px solid var(--border);padding-top:9px;margin-top:9px; }
.sig-watch-line { font-family:var(--f-mono);font-size:0.66rem;color:var(--text-2);margin:3px 0;text-align:left; }
.sig-watch-line b { color:var(--text);font-weight:500; }
.sig-timeline { border-top:1px solid var(--border);padding-top:9px;margin-top:9px;text-align:left; }
.sig-tl-label { font-size:0.58rem;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px; }
.tl-cell { display:inline-block;width:7px;height:14px;margin:0 1px 0 0;border-radius:1px;vertical-align:middle; }
.tl-r1 { background:var(--green); }
.tl-r2 { background:var(--red); }
.tl-r3, .tl-r4, .tl-r5 { background:var(--gold); }
.tl-r6, .tl-r0 { background:var(--border-3); }
.tl-r7 { background:var(--gold-pale,var(--gold)); }
.tl-r8 { background:var(--blue); }
.tl-legend { font-size:0.58rem;color:var(--text-2);margin-top:5px; }
.tl-legend .tl-cell { height:9px;width:9px;border-radius:50%; }
.gate-on  { color:var(--gold); }
.gate-off { color:var(--text-2); }
.tr-up { color:var(--green); } .tr-dn { color:var(--red); } .tr-ch { color:var(--text-2); }

/* record button + modal */
.rec-btn { font-family:var(--f-ui);font-size:0.72rem;font-weight:500;color:var(--gold);
  background:var(--gold-bg);border:1px solid var(--gold-border,var(--gold));border-radius:7px;
  padding:6px 14px;cursor:pointer;transition:0.15s; }
.rec-btn:hover { background:var(--gold);color:var(--bg); }
.modal-mask { position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:none;
  align-items:flex-start;justify-content:center;padding-top:8vh; }
.modal-mask.open { display:flex; }
.modal { background:var(--surface);border:1px solid var(--border-2);border-radius:12px;
  width:min(440px,92vw);padding:22px 24px;font-family:var(--f-ui); }
.modal h3 { font-family:var(--f-display);font-size:1.15rem;font-weight:400;margin-bottom:4px; }
.modal-sub { font-size:0.64rem;color:var(--text-2);margin-bottom:16px; }
.fld { margin-bottom:13px; }
.fld label { display:block;font-size:0.62rem;color:var(--text-2);text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:4px; }
.fld input, .fld select { width:100%;font-family:var(--f-mono);font-size:0.82rem;color:var(--text);
  background:var(--bg);border:1px solid var(--border-2);border-radius:6px;padding:8px 10px;outline:none; }
.fld input:focus, .fld select:focus { border-color:var(--gold-border,var(--gold)); }
.fld-hint { font-size:0.62rem;color:var(--text-2);margin-top:4px; }
.fld-hint a { color:var(--gold);cursor:pointer;text-decoration:underline; }
.modal-actions { display:flex;gap:10px;justify-content:flex-end;margin-top:18px; }
.btn-ghost { background:transparent;border:1px solid var(--border-2);color:var(--text-2);
  border-radius:7px;padding:7px 16px;font-size:0.74rem;cursor:pointer; }
.btn-primary { background:var(--gold);border:none;color:var(--bg);border-radius:7px;
  padding:7px 18px;font-size:0.74rem;font-weight:600;cursor:pointer; }
.btn-primary:disabled { opacity:0.5;cursor:default; }
.modal-msg { font-size:0.7rem;margin-top:10px; }

/* trades log */
.trades-wrap { margin-top:30px;padding-top:16px;border-top:1px solid var(--border); }
.trades-head { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px; }
.trades-table { width:100%;border-collapse:collapse;font-family:var(--f-mono);font-size:0.68rem; }
.trades-table th { font-size:0.56rem;color:var(--text-2);text-transform:uppercase;text-align:right;
  padding:4px 8px;border-bottom:1px solid var(--border); }
.trades-table th:first-child, .trades-table td:first-child { text-align:left; }
.trades-table td { padding:5px 8px;border-bottom:1px solid var(--border);text-align:right;color:var(--text-soft); }
.trades-empty { font-size:0.68rem;color:var(--text-2);padding:8px 0; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">SPX <em>Strat</em></div>
  {% set nav_active = 'funds' %}{% include "_nav.html" %}
  <div class="nav-right" id="nav-date">—</div>
</nav>

<div class="page">
  <div class="page-hero" style="display:flex;justify-content:space-between;align-items:flex-end;">
    <div>
      <h1>基金 <em>清仓信号</em></h1>
      <p class="page-meta">纪律工具 · 逐步清仓过渡期 · <span style="color:var(--gold)">▸ 点击行展开净值图+信号</span> · <span class="dot dot-fresh"></span>已同步本批最新净值日 <span class="dot dot-stale"></span>该只落后(悬停看日期)</p>
    </div>
    <button class="rec-btn" onclick="openRec()">＋ 记录减仓</button>
  </div>

  <div id="stale-banner" class="stale-banner" style="display:none">
    ⚠️ 数据偏旧（>3天，日度刷新可能挂了），重跑 <code>fund_exit/fund_exit_signals.py</code> 或查 launchd
  </div>

  <div id="main-content">
    <div class="unavail">加载中…</div>
  </div>

  <div id="trades-wrap" class="trades-wrap" style="display:none">
    <div class="trades-head">
      <div class="section-label" style="margin:0">减仓记录</div>
      <div id="trades-total" class="page-meta"></div>
    </div>
    <div id="trades-body"></div>
  </div>
</div>

<!-- 记录减仓 弹窗 -->
<div id="rec-mask" class="modal-mask" onclick="if(event.target===this)closeRec()">
  <div class="modal">
    <h3>记录减仓</h3>
    <div class="modal-sub">减仓后录入，工具即时更新持仓与"剩 N 周"进度，并留痕用于 vs TWAP 回溯。</div>
    <div class="fld">
      <label>基金</label>
      <select id="rec-fund" onchange="recFundChanged()"></select>
    </div>
    <div class="fld">
      <label>减仓份额（份，券商赎回填的份额）</label>
      <input id="rec-shares" type="number" min="0" step="0.01" placeholder="如 9000" oninput="recCalc()">
      <div class="fld-hint" id="rec-hint"></div>
    </div>
    <div class="fld">
      <label>交易日期</label>
      <input id="rec-date" type="date">
    </div>
    <div class="fld">
      <label>备注（可选）</label>
      <input id="rec-note" type="text" placeholder="如 按建议执行 / 部分">
    </div>
    <div id="rec-msg" class="modal-msg"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeRec()">取消</button>
      <button id="rec-submit" class="btn-primary" onclick="submitRec()">记录</button>
    </div>
  </div>
</div>

<script>
const RULE_COLOR = { 1:'ab-green', 7:'ab-gold', 8:'ab-gold', 2:'ab-red', 3:'ab-gold', 4:'ab-gold', 5:'ab-gold', 6:'ab-dim', 0:'ab-dim' };

function fmt_cny(v) {
  if (v == null) return '—';
  return '¥' + v.toLocaleString('zh-CN', {maximumFractionDigits:0});
}
function fmt_pct(v, digits=1) {
  if (v == null) return '—';
  const s = (v*100).toFixed(digits);
  return (v>=0?'+':'')+s+'%';
}
function fmt_signed(v, digits=1) {
  if (v == null) return '—';
  const s = (v*100).toFixed(digits);
  return (v>=0?'+':'')+s+'%';
}
function color_cls(v) { return v > 0 ? 'style="color:var(--green)"' : v < 0 ? 'style="color:var(--red)"' : ''; }

function trend_cls(t){ return t==='上升'?'tr-up':t==='下降'?'tr-dn':'tr-ch'; }
function gate(on,label){ return `<span class="${on?'gate-on':'gate-off'}">${on?'☑':'▢'} ${label}</span>`; }

function render_signal_panel(f, P) {
  P = P || {};
  const band = P.trend_band != null ? P.trend_band : 0.01;
  const DEEP = P.DEEP != null ? P.DEEP : 0.15;
  const RSIov = P.rsi_oversold != null ? P.rsi_oversold : 30;
  const nf = (v)=> v==null ? '—' : v.toFixed(4);
  const deepHit  = f.dist_roll != null && f.dist_roll <= -DEEP;
  const trailHit = f.latest != null && f.trail_trigger != null && f.latest <= f.trail_trigger;
  const vetoApplied = (f.action||'').includes('超卖否决');

  const trendChip = `<span class="${trend_cls(f.trend)}">${f.trend}</span>`;
  const maStack = (f.ma20!=null && f.ma60!=null)
    ? `现价 ${nf(f.latest)} · MA20 ${nf(f.ma20)} · MA60 ${nf(f.ma60)}` : '样本不足';

  // distance-to-flip watch levels (state-dependent)
  const W=[];
  const lv=(label, level)=>{ if(level!=null && f.latest!=null)
    W.push(`<div class="sig-watch-line">📍 ${label} <b>${level.toFixed(4)}</b> (${fmt_signed(level/f.latest-1)})</div>`); };
  const recBand = (P.recovery && P.recovery.band) || 0.03;
  const recClip = (P.recovery && P.recovery.clip) || 0.5;
  if (f.ma20!=null) {
    if (f.rule===7) {
      lv(`跌出前高带(−${(recBand*100).toFixed(0)}%) → 回归常规信号`, f.roll_high*(1-recBand));
    } else if (f.rule===1) {
      lv('跌破 → 退出上升·转加速清', f.ma20*(1-band));
    } else {
      if (f.roll_high!=null) lv(`反弹至 → ⑦回前高·减${(recClip*100).toFixed(0)}%`, f.roll_high*(1-recBand));
      if (f.rule===8) {
        lv('跌破 → 退出上升·回弱势信号', f.ma20*(1-band));
        W.push('<div class="sig-watch-line">📍 持续上升满15日(无破势) → 转①慢池</div>');
      } else if (f.trend==='下降') {
        lv('站上 → 退出下降·停额外', f.ma20*(1-band));
        if (!deepHit && f.roll_high!=null) lv('失守 → 转②深套·停额外', f.roll_high*(1-DEEP));
      } else {
        lv('站上 → 转上升·慢清', f.ma20*(1+band));
        if (!trailHit && f.trail_trigger!=null) lv('跌破 → ④追踪带·加额外', f.trail_trigger);
      }
    }
  }

  // clip = base + extra 分解
  const clipBreak = (f.base!=null && f.extra!=null)
    ? `周TWAP <b>${fmt_pct(f.base)}</b>${f.extra>0 ? ' + 前置 <b>'+fmt_pct(f.extra)+'</b>' : (vetoApplied ? ' + 前置 0%(超卖否决)' : '')} = <b>${fmt_pct(f.clip)}</b>`
    : fmt_pct(f.clip);

  // 信号历史迷你时间线（左旧右新；颜色=分类）
  const hist = (typeof SIG_HIST !== 'undefined' && SIG_HIST[f.code]) || [];
  const tlHtml = hist.length ? `<div class="sig-timeline">
      <div class="sig-tl-label">信号历史 · 近 ${hist.length} 交易日（左旧→右新）</div>
      ${hist.map(h=>`<span class="tl-cell tl-r${h.rule}" title="${h.date} ${h.rule_name||''}${h.day_chg!=null?' · 日'+fmt_signed(h.day_chg):''}"></span>`).join('')}
      <div class="tl-legend"><span class="tl-cell tl-r1"></span>持有 &nbsp;<span class="tl-cell tl-r3"></span>减仓(③④⑤) &nbsp;<span class="tl-cell tl-r7"></span>回前高 &nbsp;<span class="tl-cell tl-r8"></span>回升未稳 &nbsp;<span class="tl-cell tl-r2"></span>深套 &nbsp;<span class="tl-cell tl-r6"></span>观察</div>
    </div>` : '';

  return `<div class="sig-panel">
    <div class="sig-grid">
      <div class="sig-k">趋势</div><div class="sig-v">${trendChip} <span style="color:var(--text-2)">${maStack}</span></div>
      <div class="sig-k">距滚动高</div><div class="sig-v">${fmt_signed(f.dist_roll)} &nbsp; ${gate(deepHit,'深套线−'+((DEEP*100)|0)+'%')}</div>
      <div class="sig-k">追踪止盈</div><div class="sig-v">σ带 ${fmt_pct(f.trail)} · 触发位 ${nf(f.trail_trigger)} &nbsp; ${gate(trailHit,'已破')}</div>
      <div class="sig-k">超卖否决</div><div class="sig-v">RSI ${f.rsi!=null?f.rsi.toFixed(0):'—'} &nbsp; ${gate(f.oversold,'超卖 RSI<'+RSIov)} ${vetoApplied?'<span style="color:var(--gold)">→ 已挡额外，仅走周TWAP</span>':''}</div>
      <div class="sig-k">建议卖出</div><div class="sig-v">${clipBreak}</div>
      ${(() => {
        const sf = SECTORS && SECTORS.funds && SECTORS.funds[f.code];
        if (!sf || !sf.sectors || !sf.sectors.length) return '';
        const top3 = sf.sectors.slice(0,3).map(s=>`${s[0].replace(/、通信和其他电子设备制造业/,'通信电子').replace(/制造业$/,'')} ${s[1].toFixed(0)}%`).join(' · ');
        return `<div class="sig-k">重仓行业</div><div class="sig-v">${top3} <span style="color:var(--text-2)">(季报前十大, 覆盖${(sf.coverage*100).toFixed(0)}% · 滞后~1季度)</span></div>`;
      })()}
    </div>
    <div class="sig-hit">▶ 命中 ${f.action||''}</div>
    ${W.length?`<div class="sig-watch">${W.join('')}</div>`:''}
    ${tlHtml}
  </div>`;
}

function render_fund_row(f, P, dataDate) {
  if (!f.ok) {
    return `<tr class="err-row">
      <td><div class="fund-name">${f.name}</div><div class="fund-code">${f.code}</div></td>
      <td colspan="10">❌ 取数失败：${f.err || '未知错误'}</td>
    </tr>`;
  }
  const cls = RULE_COLOR[f.rule] || 'ab-dim';
  const lock = f.locked ? `<span class="lock-badge" title="${f.locked}">⚠️ 锁定</span>` : '';
  // veto badge keys off whether the veto ACTUALLY zeroed the extra (action suffix);
  // base always sells, so a vetoed fund still moves (only the extra is held).
  const vetoApplied = (f.action || '').includes('超卖否决');
  const veto = vetoApplied ? `<span class="veto-badge">超卖·仅走周TWAP</span>` : '';
  const clip_disp = f.clip > 0 ? fmt_pct(f.clip) : '持有';
  const clip_amt_disp = f.clip_amt > 0 ? fmt_cny(f.clip_amt) : '—';
  const action_short = (f.action || '').split('｜')[0].replace(/^[①②③④⑤⑥⑦⑧⓪]/, '').substring(0, 16);
  // 状态灯：该只今日净值是否已更新（latest_date == 批次最新日 → 绿；落后 → 黄）
  const fresh = f.latest_date && dataDate && f.latest_date === dataDate;
  const dot = `<span class="dot ${fresh?'dot-fresh':'dot-stale'}" title="${fresh?('今日净值已更新 '+f.latest_date):('未出今日净值，在用 '+(f.latest_date||'?'))}"></span>`;

  return `<tr class="fund-row" data-code="${f.code}" onclick="toggle_chart('${f.code}')">
    <td>
      <div class="fund-name">${dot}<span class="chev">▸</span>${f.name}${lock}</div>
      <div class="fund-code" style="margin-left:26px">${f.code}</div>
    </td>
    <td>${fmt_cny(f.mv)}</td>
    <td><span class="action-badge ${cls}">${action_short}</span>${veto}</td>
    <td ${color_cls(f.clip)}>${clip_disp}</td>
    <td ${color_cls(f.clip_amt)}>${clip_amt_disp}</td>
    <td>${f.cum_reduced!=null && f.cum_reduced>0 ? '<span style="color:var(--green)">'+(f.cum_reduced*100).toFixed(0)+'%</span>' : '—'}</td>
    <td ${color_cls(f.dist_roll)}>${fmt_signed(f.dist_roll)}</td>
    <td ${color_cls(f.day_chg)}>${fmt_signed(f.day_chg)}</td>
    <td>${f.rsi != null ? f.rsi.toFixed(0) : '—'}</td>
    <td ${color_cls(f.vs_twap)}>${fmt_signed(f.vs_twap)}</td>
    <td ${color_cls(f.pnl_pct)}>${fmt_pct(f.pnl_pct)}</td>
  </tr>
  <tr class="fund-chart-row" id="chart-${f.code}">
    <td class="fund-chart-cell" colspan="11">
      ${render_signal_panel(f, P)}
      <img alt="${f.name} 净值图" data-src="/api/fund-exit/chart/${f.code}" data-try="0"
           onerror="if((+this.dataset.try)<3){this.dataset.try=+this.dataset.try+1;const s=(this.dataset.src||this.src).split('?')[0];const me=this;setTimeout(()=>{me.src=s+'?r='+Date.now();},700);}else if(!this.nextElementSibling||!this.nextElementSibling.classList.contains('chart-err')){this.style.display='none';this.insertAdjacentHTML('afterend','<p class=chart-err>图表加载失败 — 收起再展开可重试</p>');}">
    </td>
  </tr>`;
}

function toggle_chart(code) {
  const row = document.getElementById('chart-' + code);
  if (!row) return;
  const opening = !row.classList.contains('open');
  row.classList.toggle('open');
  const tr = row.previousElementSibling;
  if (tr) tr.classList.toggle('expanded');
  if (opening) {   // 展开时才加载图（避免折叠行 10 张图并发抓取打爆单线程 web）
    const img = row.querySelector('img[data-src]');
    if (img) {
      if (!img.getAttribute('src')) img.src = img.dataset.src;
      else if (img.style.display === 'none') {   // 上次3连败: 重置重试, 兑现"再展开可重试"
        row.querySelector('.chart-err')?.remove();
        img.style.display = ''; img.dataset.try = 0;
        img.src = img.dataset.src + '?r=' + Date.now();
      }
    }
  }
}

function render_table(title, funds, P, dataDate) {
  if (!funds.length) return '';
  const rows = funds.map(f => render_fund_row(f, P, dataDate)).join('');
  return `
    <div class="section-label">${title}</div>
    <table class="fund-table">
      <thead><tr>
        <th>基金</th>
        <th>持仓额</th>
        <th>动作</th>
        <th>本周%</th>
        <th>本周额</th>
        <th>累积减</th>
        <th>距滚高</th>
        <th>日涨跌</th>
        <th>RSI</th>
        <th>vs均匀</th>
        <th title="2026-05-31 中信App快照口径, 未随净值/减仓更新">盈亏*</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function load(retry=0) {
  let d;
  try {
    const resp = await fetch('/api/fund-exit/signals', {cache:'no-store'});
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    d = await resp.json();
  } catch(e) {
    if (retry < 3) { setTimeout(()=>load(retry+1), 1500); return; }
    document.getElementById('main-content').innerHTML =
      `<div class="unavail"><p>加载失败：${e.message||e}</p><p style="margin-top:8px"><a style="color:var(--gold);cursor:pointer" onclick="load(0)">点击重试</a></p></div>`;
    return;
  }

  if (!d.available) {
    document.getElementById('main-content').innerHTML =
      `<div class="unavail"><p>${d.message || '信号未生成'}</p><p style="margin-top:8px">运行 <code>fund_exit/fund_exit_signals.py</code> 后刷新</p></div>`;
    return;
  }

  // 信号历史（迷你时间线用）+ 行业透视 —— 渲染前先取，失败不阻塞主表
  try { SIG_HIST = (await (await fetch('/api/fund-exit/signal-history')).json()).history || {}; }
  catch(e) { SIG_HIST = {}; }
  try { const s = await (await fetch('/api/fund-exit/sectors')).json(); SECTORS = s.available ? s : null; }
  catch(e) { SECTORS = null; }

  // staleness check
  if (d.generated_at) {
    const genMs = new Date(d.generated_at).getTime();
    const ageDay = (Date.now() - genMs) / 86400000;
    if (ageDay > 3) document.getElementById('stale-banner').style.display = '';
  }

  const acc = d.account || {};
  const cad = d.cadence || {};
  const fast = cad.fast || {}, slow = cad.slow || {};
  const pct = (v) => v!=null ? (v*100).toFixed(1)+'%' : '—';
  const freshAge = d.generated_at ? (() => {
    const diff = Math.round((Date.now()-new Date(d.generated_at).getTime())/60000);
    return diff < 60 ? diff+'m 前' : Math.round(diff/60)+'h 前';
  })() : '—';

  const acctHtml = `
    <div class="acct-strip">
      <div class="acct-cell">
        <div class="acct-label">总市值</div>
        <div class="acct-value">${fmt_cny(acc.total_mv)}</div>
        <div class="acct-sub">起始 ${fmt_cny(acc.original_total_mv)}</div>
      </div>
      <div class="acct-cell">
        <div class="acct-label">本周减仓目标</div>
        <div class="acct-value" style="color:var(--gold)">${fmt_cny(acc.suggested_total)}</div>
        <div class="acct-sub">本周总减仓 ${pct(acc.week_reduce_pct)}（占总市值）</div>
      </div>
      <div class="acct-cell">
        <div class="acct-label">累积减仓</div>
        <div class="acct-value" style="color:var(--green)">${pct(acc.cum_reduced_pct)}</div>
        <div class="acct-sub">已清出原始仓位（份额口径）</div>
      </div>
      <div class="acct-cell">
        <div class="acct-label">加速池 <small style="font-weight:400;opacity:0.7">非上升·${fast.weeks ?? '—'}周</small></div>
        <div class="acct-value" style="font-size:0.95rem">${fmt_cny(fast.mv)}</div>
        <div class="acct-sub">TWAP ${pct(fast.twap)}/只·截止${fast.deadline || '—'}</div>
      </div>
      <div class="acct-cell">
        <div class="acct-label">延长池 <small style="font-weight:400;opacity:0.7">上升①·${slow.weeks ?? '—'}周</small></div>
        <div class="acct-value" style="color:var(--green);font-size:0.95rem">${fmt_cny(slow.mv)}</div>
        <div class="acct-sub">TWAP ${pct(slow.twap)}/只·截止${slow.deadline || '—'}</div>
      </div>
      <div class="acct-cell">
        <div class="acct-label">数据日</div>
        <div class="acct-value" style="font-size:0.80rem">${d.data_date || '—'}</div>
        <div class="acct-sub">${freshAge}生成 · 每周一次操作</div>
      </div>
      <div class="acct-regime">市场 <em style="font-style:normal;color:var(--text)">${d.market_regime || '—'}</em>（仅提示，非决策依据）${(() => {
        const a = SECTORS && SECTORS.account;
        if (!a || !a.top_sector) return '';
        const warn = a.top_share > 0.30;
        const nm = a.top_sector.replace(/、通信和其他电子设备制造业/,'通信电子').replace(/制造业$/,'');
        return ` · 行业集中 <span style="color:${warn?'var(--gold)':'var(--text)'}">${nm} ${(a.top_share*100).toFixed(0)}%</span>(占已披露重仓${warn?' ⚠️剩余持仓高度同质':''})`;
      })()}</div>
    </div>`;

  const funds = d.funds || [];
  const reducible = funds.filter(f => f.ok && [7,8,3,4,5].includes(f.rule)).sort((a,b)=>b.clip-a.clip);
  const strong    = funds.filter(f => f.ok && f.rule === 1);
  const other     = funds.filter(f => !f.ok || [2,6,0].includes(f.rule));

  const P = d.params || {};
  const tablesHtml =
    render_table('🟡 信号减仓（rule 7/8/3/4/5 · 快池TWAP地板25% + 弱倾斜前置；⑦回前高=减50% · 按本周% 降序）', reducible, P, d.data_date) +
    render_table('🟢 上升趋势 · 延长慢清（rule 1 · 慢速TWAP，让赢家多跑）', strong, P, d.data_date) +
    render_table('🔵 快池·仅走TWAP（rule 2深套 / 6观察 / 0数据不足 · 无前置）', other, P, d.data_date);

  const disclaimer = d.disclaimer
    ? `<p class="disclaimer">⚠️ ${d.disclaimer}</p>` : '';

  document.getElementById('main-content').innerHTML = acctHtml + tablesHtml + disclaimer;
  LAST = d;
}

// ── 记录减仓 ──
let LAST = null;
let SIG_HIST = {};
let SECTORS = null;
const RULE_LABEL = {1:'①上升',7:'⑦回前高',8:'⑧回升未稳',2:'②深套',3:'③确认下降',4:'④破带',5:'⑤破MA20',6:'⑥观察',0:'数据不足'};

function openRec() {
  if (!LAST || !LAST.funds) { return; }
  const sel = document.getElementById('rec-fund');
  sel.innerHTML = LAST.funds.filter(f=>f.ok && (f.mv||0)>0)
    .map(f=>`<option value="${f.code}" data-mv="${f.mv}" data-clip="${f.clip||0}" data-amt="${f.clip_amt||0}" data-unit="${f.unit_nav||0}">${f.name}（${f.code}）· 持仓 ${fmt_cny(f.mv)}</option>`).join('');
  document.getElementById('rec-date').value = new Date().toLocaleDateString('sv-SE');
  document.getElementById('rec-shares').value = '';
  document.getElementById('rec-note').value = '';
  document.getElementById('rec-msg').textContent = '';
  recFundChanged();
  document.getElementById('rec-mask').classList.add('open');
}
function closeRec() { document.getElementById('rec-mask').classList.remove('open'); }

function recFundChanged() {
  document.getElementById('rec-shares').value = '';
  recCalc();
}

function recCalc() {
  const o = document.getElementById('rec-fund').selectedOptions[0];
  if (!o) return;
  const unit = +o.dataset.unit, mv = +o.dataset.mv, amt = +o.dataset.amt, clip = +o.dataset.clip;
  const totalSh = unit>0 ? mv/unit : 0;
  const suggSh  = unit>0 ? amt/unit : 0;
  const sh = +document.getElementById('rec-shares').value || 0;
  const amount = sh * unit;
  const fmtSh = x => Math.round(x).toLocaleString('zh-CN');
  document.getElementById('rec-hint').innerHTML =
    `单位净值 <b>${unit>0?unit.toFixed(4):'—'}</b> · 约 ${amount>0?'<b style="color:var(--gold)">'+fmt_cny(amount)+'</b>':'¥—'}（持仓约 ${fmtSh(totalSh)} 份）<br>`
    + `本周建议 ${(clip*100).toFixed(1)}% ≈ <a onclick="document.getElementById('rec-shares').value=${Math.round(suggSh)};recCalc()">${fmtSh(suggSh)}份</a> · `
    + `<a onclick="document.getElementById('rec-shares').value=${Math.round(totalSh)};recCalc()">全部赎回(${fmtSh(totalSh)}份)</a>`;
}

async function submitRec() {
  const o = document.getElementById('rec-fund').selectedOptions[0];
  const shares = +document.getElementById('rec-shares').value;
  const unit = o ? +o.dataset.unit : 0;
  const amount = shares * unit;
  const msg = document.getElementById('rec-msg');
  if (!o || !(shares>0)) { msg.style.color='var(--red)'; msg.textContent='请选基金并填正数份额'; return; }
  if (!(unit>0)) { msg.style.color='var(--red)'; msg.textContent='缺单位净值，无法换算（稍后重试或刷新）'; return; }
  const btn = document.getElementById('rec-submit'); btn.disabled = true;
  try {
    const r = await fetch('/api/fund-exit/record-trade', {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code:o.value, shares:shares, amount_cny:amount, date:document.getElementById('rec-date').value, note:document.getElementById('rec-note').value})});
    const j = await r.json();
    if (!j.ok) { msg.style.color='var(--red)'; msg.textContent='失败：'+(j.error||'未知'); btn.disabled=false; return; }
    msg.style.color='var(--green)';
    msg.textContent = `已记录：${j.name} 赎 ${Math.round(shares).toLocaleString('zh-CN')}份 ≈ ${fmt_cny(j.amount)}（${(j.pct_sold*100).toFixed(1)}%），余 ${fmt_cny(j.new_mv)}`;
    await load(); await loadTrades();
    setTimeout(closeRec, 1300);
  } catch(e) { msg.style.color='var(--red)'; msg.textContent='网络错误'; }
  btn.disabled = false;
}

async function loadTrades() {
  let j; try { j = await (await fetch('/api/fund-exit/trades')).json(); } catch(e) { return; }
  const tr = j.trades || [];
  const wrap = document.getElementById('trades-wrap');
  wrap.style.display = '';
  if (!tr.length) { document.getElementById('trades-body').innerHTML = '<div class="trades-empty">暂无记录 —— 减仓后点右上"记录减仓"。</div>'; document.getElementById('trades-total').textContent=''; return; }
  const tot = tr.reduce((s,t)=>s+(+t.amount_cny||0),0);
  document.getElementById('trades-total').textContent = `已减仓累计 ${fmt_cny(tot)} · ${tr.length} 笔`;
  document.getElementById('trades-body').innerHTML = `
    <table class="trades-table">
      <thead><tr><th>日期</th><th>基金</th><th>份额</th><th>减仓¥</th><th>占比</th><th>当时信号</th><th>建议%</th><th>备注</th></tr></thead>
      <tbody>${tr.map(t=>`<tr>
        <td>${t.trade_date||''}</td>
        <td style="color:var(--text)">${t.name||t.code}</td>
        <td>${t.shares?Math.round(+t.shares).toLocaleString('zh-CN'):'—'}</td>
        <td>${fmt_cny(+t.amount_cny)}</td>
        <td>${t.pct_sold?(+t.pct_sold*100).toFixed(1)+'%':'—'}</td>
        <td>${RULE_LABEL[+t.rule]??'—'}</td>
        <td>${t.recommended_clip?(+t.recommended_clip*100).toFixed(1)+'%':'—'}</td>
        <td style="text-align:left;color:var(--text-2)">${t.note||''}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRec(); });

load();
loadTrades();

// nav date
const nd = document.getElementById('nav-date');
if (nd) nd.textContent = new Date().toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'});
</script>
