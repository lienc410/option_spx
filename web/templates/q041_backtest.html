<script>
const COLORS = { SPX:'var(--gold)', GOOGL:'var(--blue)', AMZN:'var(--green)' };
let charts = {};
let _q041Overview = null;
let _mainBpTimeline = [];

document.getElementById('nav-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

function fmtDate(s) { return s ? s.slice(0,10) : '—'; }
function fmtD(n) {
  if (n==null) return '—';
  const abs=Math.abs(n), sign=n<0?'-':'+';
  return sign+'$'+(abs>=1000?Math.round(abs).toLocaleString():abs.toFixed(0));
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(_){} });
  charts = {};
}

// ── Metric computation ───────────────────────────────────────────────────────
function computeMetrics(s) {
  const trades = s.trades || [];
  const equity = s.equity_curve || [];

  const sorted = [...trades].sort((a,b) => a.entry_date < b.entry_date ? -1 : 1);
  const firstDate = sorted[0]?.entry_date?.slice(0,10) || '—';
  const lastDate  = sorted[sorted.length-1]?.exit_date?.slice(0,10) || '—';

  const wins   = trades.filter(t => t.pnl > 0);
  const losses  = trades.filter(t => t.pnl <= 0);
  const avgWin  = wins.length   ? wins.reduce((s,t)=>s+t.pnl,0) / wins.length   : null;
  const avgLoss = losses.length ? losses.reduce((s,t)=>s+t.pnl,0) / losses.length : null;
  const expectancy = trades.length ? s.total_pnl / trades.length : null;

  const initEq = equity[0]?.equity || 50000;
  const years  = firstDate !== '—' && lastDate !== '—'
    ? Math.max((new Date(lastDate) - new Date(firstDate)) / (365.25*24*3600*1000), 0.01)
    : null;
  const annROE = years && initEq > 0 ? s.total_pnl / initEq / years * 100 : null;

  let peak = -Infinity, maxDD = 0;
  for (const e of equity) { peak = Math.max(peak, e.equity); maxDD = Math.min(maxDD, e.equity - peak); }

  let sharpe = null;
  if (equity.length > 4) {
    const rets = [];
    for (let i=1;i<equity.length;i++) {
      const p=equity[i-1].equity, c=equity[i].equity;
      if (p>0 && c !== p) rets.push((c-p)/p);
    }
    if (rets.length > 1) {
      const mean = rets.reduce((s,r)=>s+r,0)/rets.length;
      const std  = Math.sqrt(rets.reduce((s,r)=>s+(r-mean)**2,0)/rets.length);
      if (std > 0) sharpe = mean/std * Math.sqrt(52);
    }
  }

  return { firstDate, lastDate, avgWin, avgLoss, expectancy, annROE, maxDD, sharpe };
}

function buildMetricCards(s, canonicalSummary) {
  const m = computeMetrics(s);
  const wr = s.win_rate_pct?.toFixed(1) + '%';
  const pnlStr = fmtD(s.total_pnl);
  const canonicalAnnRoe = typeof canonicalSummary?.ann_roe_pct === 'number'
    ? canonicalSummary.ann_roe_pct
    : null;
  const annSource = canonicalAnnRoe != null ? canonicalAnnRoe : m.annROE;
  const annStr = annSource != null ? (annSource>=0?'+':'')+annSource.toFixed(1)+'%' : '—';
  const ddStr  = m.maxDD < 0 ? '-$'+Math.round(Math.abs(m.maxDD)).toLocaleString() : '$0';
  const shpStr = m.sharpe != null ? m.sharpe.toFixed(2) : '—';
  const exStr  = m.expectancy != null ? fmtD(m.expectancy) : '—';
  const winAvg = m.avgWin  != null ? '+$'+Math.round(m.avgWin).toLocaleString()  : '—';
  const lossAvg= m.avgLoss != null ? '-$'+Math.round(Math.abs(m.avgLoss)).toLocaleString() : '—';
  const annSub = canonicalAnnRoe != null
    ? 'Based on $500k account'
    : 'Based on $500k account (est.)';

  return `<div class="metric-grid">
    <div class="metric-card">
      <div class="metric-label">Total Trades</div>
      <div class="metric-value">${s.n_trades}</div>
      <div class="metric-sub">${m.firstDate} → ${m.lastDate}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Win Rate</div>
      <div class="metric-value ${s.win_rate_pct>=80?'up':'warn'}">${wr}</div>
      <div class="metric-sub">Stop rate ${s.stop_rate_pct?.toFixed(1)}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Avg Win / Loss</div>
      <div class="metric-value up" style="font-size:0.88rem">${winAvg}</div>
      <div class="metric-sub" style="color:var(--red)">${lossAvg}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Expectancy</div>
      <div class="metric-value ${m.expectancy>=0?'up':'down'}">${exStr}</div>
      <div class="metric-sub">per trade</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Total P&L</div>
      <div class="metric-value ${s.total_pnl>0?'up':'down'}">${pnlStr}</div>
      <div class="metric-sub">net realized</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Ann. ROE (acct.)</div>
      <div class="metric-value ${annSource!=null&&annSource>=3?'up':annSource>=1?'warn':'down'}">${annStr}</div>
      <div class="metric-sub">${annSub}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Max Drawdown</div>
      <div class="metric-value ${m.maxDD<-5000?'down':'warn'}">${ddStr}</div>
      <div class="metric-sub">peak-to-trough</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Sharpe Ratio</div>
      <div class="metric-value ${m.sharpe!=null&&m.sharpe>=2?'up':m.sharpe>=1?'warn':'down'}">${shpStr}</div>
      <div class="metric-sub">annualized</div>
    </div>
  </div>`;
}

// ── Chart: Price + Entry/Exit overlay ────────────────────────────────────────
function buildPriceOverlay(canvasId, sleeve, overlayState) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const priceData = sleeve.price_series || [];
  if (!priceData.length) {
    canvas.parentElement.innerHTML =
      `<div style="padding:20px;font-family:var(--f-ui);font-size:0.65rem;color:var(--text-muted)">Price series not available.</div>`;
    return;
  }

  const col = COLORS[sleeve.symbol] || 'var(--text)';
  const priceByDate = {};
  priceData.forEach(p => { priceByDate[p.date] = p.close; });

  // Build entry/exit point sets
  const entries = [], exitWins = [], exitStops = [];
  (sleeve.trades || []).forEach(t => {
    const ep = priceByDate[fmtDate(t.entry_date)];
    const xp = priceByDate[fmtDate(t.exit_date)];
    if (ep != null) entries.push({ x: fmtDate(t.entry_date), y: ep, trade: t });
    if (xp != null) {
      (t.exit_reason === 'profit_target' ? exitWins : exitStops)
        .push({ x: fmtDate(t.exit_date), y: xp, trade: t });
    }
  });

  // Cumulative P&L from equity curve (left-aligned to 0)
  const initEquity = (sleeve.equity_curve || [])[0]?.equity ?? 50000;
  const pnlPoints = (sleeve.equity_curve || []).map(r => ({
    x: r.date, y: Math.round(r.equity - initEquity)
  }));

  // Drawdown from equity curve
  let peak = initEquity;
  const ddPoints = (sleeve.equity_curve || []).map(r => {
    peak = Math.max(peak, r.equity);
    return { x: r.date, y: peak > 0 ? Math.round((r.equity - peak) / peak * 100 * 10) / 10 : 0 };
  });

  // VIX series
  const allDates = priceData.map(p => p.date);
  const vixByDate = {};
  // VIX data embedded in trades — reconstruct from trades' vix_at_entry per date
  (sleeve.trades || []).forEach(t => {
    if (t.vix_at_entry != null) vixByDate[fmtDate(t.entry_date)] = t.vix_at_entry;
  });

  const datasets = [
    // Price line (primary)
    {
      type: 'line',
      label: `${sleeve.symbol} Close`,
      data: priceData.map(p => ({ x: p.date, y: p.close })),
      borderColor: col,
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.1,
      yAxisID: 'yPrice',
      order: 10,
    },
    // Entries: green up-triangle
    {
      type: 'scatter',
      label: 'Entry',
      data: entries,
      backgroundColor: 'var(--theme-lit-123)',
      borderColor: 'var(--theme-lit-112)',
      borderWidth: 1,
      pointStyle: 'triangle',
      rotation: 0,
      pointRadius: 7,
      pointHoverRadius: 9,
      yAxisID: 'yPrice',
      order: 1,
    },
    // Exit wins: light green down-triangle
    {
      type: 'scatter',
      label: 'Exit (profit)',
      data: exitWins,
      backgroundColor: 'var(--theme-lit-114)',
      borderColor: 'var(--theme-lit-107)',
      borderWidth: 1,
      pointStyle: 'triangle',
      rotation: 180,
      pointRadius: 6,
      pointHoverRadius: 8,
      yAxisID: 'yPrice',
      order: 2,
    },
    // Exit stops: red down-triangle
    {
      type: 'scatter',
      label: 'Exit (stop)',
      data: exitStops,
      backgroundColor: 'var(--theme-lit-086)',
      borderColor: 'var(--theme-lit-078)',
      borderWidth: 1,
      pointStyle: 'triangle',
      rotation: 180,
      pointRadius: 6,
      pointHoverRadius: 8,
      yAxisID: 'yPrice',
      order: 3,
    },
    // Cumulative P&L (right axis, optional)
    {
      type: 'line',
      label: 'Cum. P&L',
      data: pnlPoints,
      borderColor: 'var(--theme-lit-044)',
      backgroundColor: 'transparent',

function resetOverlayZoom(sym) {
  const c = charts[`ov-${sym}`];
  if (c) try { c.resetZoom(); } catch(_) {}
}

function setOverlayRange(sym, range) {
  const id = `ov-${sym}`;
  const c = charts[id];
  if (!c || !c._fullData) return;

  // Compute cutoff date string
  const now = new Date();
  let cutoff = null;
  if (range === '1yr') cutoff = new Date(now.getFullYear()-1, now.getMonth(), now.getDate());
  else if (range === '3yr') cutoff = new Date(now.getFullYear()-3, now.getMonth(), now.getDate());
  else if (range === '5yr') cutoff = new Date(now.getFullYear()-5, now.getMonth(), now.getDate());
  const cutStr = cutoff ? cutoff.toISOString().slice(0,10) : null;

  // Filter each dataset by x (date string)
  c.data.datasets.forEach((ds, i) => {
    const full = c._fullData[i];
    if (!full) return;
    ds.data = cutStr ? full.filter(p => (p.x || '') >= cutStr) : full;
  });
  c.update();

  // Update button active states
  document.querySelectorAll(`.range-btn[data-sym="${sym}"]`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.range === range);
  });
}

function toggleOverlay(canvasId, sleeve, key, checked) {
  const c = charts[canvasId];
  if (!c) return;
  // Dataset indices: 0=price,1=entry,2=exitWin,3=exitStop,4=pnl,5=dd
  const idxMap = { pnl: 4, dd: 5 };
  const idx = idxMap[key];
  if (idx == null) return;
  c.data.datasets[idx].hidden = !checked;
  // Show/hide right axis
  const anyRight = !c.data.datasets[4].hidden || !c.data.datasets[5].hidden;
  c.options.scales.yRight.display = anyRight;
  c.update();
}

// ── Chart: DTE at exit histogram ────────────────────────────────────────────
function buildDteChart(id, trades) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const bins=[0,4,8,12,16,20,30,99];
  const labels=bins.slice(0,-1).map((b,i)=>`${b}–${bins[i+1]-1}d`);
  const sums=new Array(bins.length-1).fill(0);
  const counts=new Array(bins.length-1).fill(0);
  trades.forEach(t=>{const v=t.dte_at_exit??0;for(let i=0;i<bins.length-1;i++)if(v>=bins[i]&&v<bins[i+1]){sums[i]+=t.pnl||0;counts[i]+=1;break;}});
  const avgPnl = sums.map((sum, i) => counts[i] ? Math.round(sum / counts[i]) : 0);
  charts[id]=new Chart(canvas,{type:'bar',data:{labels,datasets:[{data:avgPnl,backgroundColor:avgPnl.map(v=>v>=0?'var(--theme-lit-116)':'var(--theme-lit-080)'),borderRadius:3}]},
    options:{responsive:true,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${fmtD(ctx.parsed.y)} avg P&L (backtest data)`}}},
      scales:{x:{ticks:{color:'var(--text-2)',font:{family:'JetBrains Mono',size:9},maxRotation:0},grid:{color:'var(--border)'}},
        y:{ticks:{color:'var(--text-2)',font:{family:'JetBrains Mono',size:10},callback:v=>'$'+Math.round(v).toLocaleString()},grid:{color:'var(--border)'}}}}});
}

            <button class="range-btn active" data-sym="${s.symbol}" data-range="all" onclick="setOverlayRange('${s.symbol}','all')">All</button>
            <button class="range-btn" style="margin-left:6px" onclick="resetOverlayZoom('${s.symbol}')">↩ 全局</button>
          </div>
        </div>
        <canvas id="${ovId}" height="240" style="width:100%"></canvas>
      </div>

      <!-- Waterfall + DTE/Scatter -->
      <div class="chart-wrap">
        <div class="chart-hd">
          <span class="chart-title">${s.symbol} · 逐笔 P&L（时间序列）</span>
          <span style="font-family:var(--f-mono);font-size:0.62rem;color:var(--text-2)">WR ${s.win_rate_pct.toFixed(1)}% · Stop ${s.stop_rate_pct.toFixed(1)}%</span>
        </div>
        <canvas id="wf-${s.symbol}" height="100" style="width:100%"></canvas>
      </div>

      <div class="two-col-charts">
      <div class="chart-wrap" style="margin-bottom:0">
        <div class="chart-title" style="margin-bottom:12px">P&L by DTE at Close <span style="font-size:0.58rem;color:var(--text-2)">(backtest data)</span></div>
          <canvas id="dte-${s.symbol}" height="150" style="width:100%"></canvas>
        </div>
        <div class="chart-wrap" style="margin-bottom:0">
          <div class="chart-title" style="margin-bottom:12px">P&L vs 持仓天数</div>
          <canvas id="sc-${s.symbol}" height="150" style="width:100%"></canvas>
        </div>
      </div>

      <div class="section-label" style="margin-top:20px">VIX at Entry 分布</div>
      <div class="chart-wrap">
        <div class="chart-title" style="margin-bottom:12px">${s.symbol} · VIX 入场分布（win / loss 分层）</div>
        <canvas id="vix-${s.symbol}" height="120" style="width:100%"></canvas>
      </div>

      <div class="section-label" style="margin-top:20px">Trade Log</div>
      ${tradeTable(s.trades)}
    </div>`;
  }).join('');

  // Tier 2 comparison
  const t2 = data.sleeves.filter(s=>s.symbol!=='SPX');
  if (t2.length >= 2) {
    html += `<div class="section-label" style="margin-top:32px">Tier 2 · GOOGL vs AMZN 对比</div>
      <div class="tier2-compare">` + t2.map(s=>{
        const trades=s.trades||[];
        const worst=trades.length?Math.min(...trades.map(t=>t.pnl)):null;
        const avg=s.n_trades>0?s.total_pnl/s.n_trades:null;
        const col=COLORS[s.symbol]||'var(--text)';
        return `<div class="compare-card" style="border-top:3px solid ${col}">
          <div class="compare-hd"><span class="compare-sym" style="color:${col}">${s.symbol}</span><span style="font-family:var(--f-ui);font-size:0.60rem;color:var(--text-2)">Tier 2 CSP</span></div>
          <div class="compare-rows">
            <div class="compare-row"><span class="compare-lbl">Win Rate</span><span class="compare-val ${s.win_rate_pct>=80?'up':'warn'}">${s.win_rate_pct.toFixed(1)}%</span></div>
            <div class="compare-row"><span class="compare-lbl">Stop Rate</span><span class="compare-val ${s.stop_rate_pct>20?'down':'dim'}">${s.stop_rate_pct.toFixed(1)}%</span></div>
            <div class="compare-row"><span class="compare-lbl">Total P&L</span><span class="compare-val ${s.total_pnl>0?'up':'down'}">${fmtD(s.total_pnl)}</span></div>
            <div class="compare-row"><span class="compare-lbl">Avg / trade</span><span class="compare-val ${avg>=0?'up':'down'}">${fmtD(avg)}</span></div>
            <div class="compare-row"><span class="compare-lbl">N Trades</span><span class="compare-val dim">${s.n_trades}</span></div>
            <div class="compare-row"><span class="compare-lbl">Worst trade</span><span class="compare-val down">${fmtD(worst)}</span></div>
          </div>
        </div>`;
      }).join('') + `</div>`;
  }

  // ── Trading Discipline (per-sleeve, since Q041 sleeves are independent) ──
  html += `
    <div class="discipline-section">
      <div class="discipline-title">Trading Discipline · 各 sleeve 独立规则</div>

      <div class="discipline-card">
        <div class="discipline-card-sym">Tier 1 · SPX Cash-Secured Put <span style="font-size:0.55rem;color:var(--text-muted);font-style:italic;margin-left:8px">RETIRED — 已被 /ES short put 替代</span></div>
        <div class="discipline-row">
          <div class="discipline-key">Entry</div>
          <div class="discipline-val">Δ<code>0.20</code> · DTE <code>30 ±10</code>（目标 25–40）· 每月第三个 Friday 收盘前 · close &gt; <code>$0.10</code> · 无 VIX 门槛</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Exit</div>
          <div class="discipline-val">持有至到期（欧式现金结算）— 无 profit target，接受 assignment</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Sizing</div>
          <div class="discipline-val">≤ <code>20%</code> 账户 BP · 禁止叠仓（单 sleeve 同时只持一笔）</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Risk</div>
          <div class="discipline-val">VIX 单周 <code>+40%</code> → 下个 cycle 缩敞口；连续 2 亏 → PM review</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Frequency</div>
          <div class="discipline-val">每月一次 (LEAPS-cycle 配套)</div>
        </div>
      </div>

      <div class="discipline-card">
        <div class="discipline-card-sym">Tier 2 · GOOGL / AMZN CSP</div>
        <div class="discipline-row">
          <div class="discipline-key">Entry</div>
          <div class="discipline-val">GOOGL Δ<code>0.20</code> · AMZN Δ<code>0.25</code> · DTE <code>21 ±7</code> · 每月第三个 Friday 收盘前 · close &gt; <code>$0.10</code> · 无 VIX 门槛</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Exit</div>
          <div class="discipline-val">持有至到期 — 接受 assignment（Q041 设计上允许）</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Sizing</div>
          <div class="discipline-val">单名 ≤ <code>10%</code> 账户 BP · Tier 2 合计 ≤ <code>15%</code></div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Risk</div>
          <div class="discipline-val">个股 <code>8–10%</code> 单月移动可深度穿越 strike — 接受 assignment 时需准备覆盖现金</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Frequency</div>
          <div class="discipline-val">每月一次 · 单 sleeve 同时只持一笔</div>
        </div>
      </div>

      <div class="discipline-card">
        <div class="discipline-card-sym">Tier 3 · COST / JPM Earnings Iron Condor</div>
        <div class="discipline-row">
          <div class="discipline-key">Entry</div>
          <div class="discipline-val">财报前 · VIX ≥ <code>15</code> · DTE <code>1–14d</code>（覆盖财报日）· IMR ≥ <code>33%</code>（可选）</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Exit</div>
          <div class="discipline-val">持有至到期</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Sizing</div>
          <div class="discipline-val">Tier 3 合计 ≤ <code>5%</code> 账户 BP</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Risk</div>
          <div class="discipline-val">仅观察 — 收集 ≥4 个财报周期后再评估是否升级到生产</div>
        </div>
        <div class="discipline-row">
          <div class="discipline-key">Frequency</div>
          <div class="discipline-val">每个标的每季度 1 次（财报触发）</div>
        </div>
      </div>

      <div class="discipline-footnote">
        ⚠ FAIL 标记不等于必须平仓 — Q041 设计上接受 assignment，以个股长期吸收。stop 表为可见性工具，非 actionable rule。
        Source: <code>web/templates/q041.html</code> · <code>SLEEVE_SPEC</code> (line 290).
      </div>
    </div>`;

  document.getElementById('body-area').innerHTML = html;

  // Store sleeves for overlay toggle callbacks
  window._sleeves = {};
  data.sleeves.forEach(s => { window._sleeves[s.symbol] = s; });

  // Build all charts
  buildPnlChart(data.sleeves, overview);
  buildVixRegimeChart(data.sleeves);
  buildIvEntryPaperChart(overview);
  data.sleeves.forEach(s => {
    buildPriceOverlay(`ov-${s.symbol}`, s, { pnl: true, dd: false });
    buildWaterfallChart(`wf-${s.symbol}`, s.trades);
    buildDteChart(`dte-${s.symbol}`, s.trades);
    buildScatterChart(`sc-${s.symbol}`, s.trades);
    buildVixChart(`vix-${s.symbol}`, s.trades);
  });
  buildBpTimelineChart(overview, _mainBpTimeline, document.getElementById('toggle-main-bp')?.checked);
}

function toggleMainBpTimeline(checked) {
  buildBpTimelineChart(_q041Overview || {}, _mainBpTimeline || [], checked);
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadBacktest() {
  const area = document.getElementById('body-area');
  const info = document.getElementById('cache-info');
  const start = document.getElementById('ctrl-start').value;
  area.innerHTML = '<div class="loading-msg">Loading…</div>';
  destroyCharts();
  info.textContent = '';
  try {
    const [res, ovRes, bpRes]  = await Promise.all([
      fetch(`/api/q041/backtest?start=${start}`),
      fetch('/api/q041/overview'),
      fetch('/api/portfolio/bp-timeline'),
    ]);
    const data = await res.json();
    _q041Overview = await ovRes.json();
    const bpData = await bpRes.json();
    _mainBpTimeline = bpData.rows || [];
    if (data.error) throw new Error(data.error);
    if (data._cached_at) {
      info.textContent = `Cached · ${data._cached_at.slice(0,10)}`;
    }
    render(data);
  } catch (e) {
    area.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

async function forceRefresh() {
  const btn  = document.getElementById('refresh-btn');
  const info = document.getElementById('cache-info');
  const start = document.getElementById('ctrl-start').value;
  btn.disabled = true; btn.textContent = '↻ Refreshing…';
  info.textContent = 'Recomputing (~20s)…';
  try {
    const r = await fetch(`/api/q041/backtest/refresh?start=${start}`, { method: 'POST' });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    await loadBacktest();
  } catch (e) {
    info.textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false; btn.textContent = '↻ Refresh cache';
  }
}

// Auto-load on page open
loadBacktest();
</script>
