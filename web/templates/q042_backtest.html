<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q042 Backtest · Drawdown Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400;1,6..72,600&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#080A13; --surface:#0D1020; --surface-hi:#131728;
  --border:#191E33; --border-2:#232A42;
  --text:#C4CEEC; --text-2:#606880; --text-muted:#363C52;
  --gold:#C9A840; --gold-bg:rgba(201,168,64,0.07); --gold-border:rgba(201,168,64,0.22);
  --green:#42CC7C; --green-bg:rgba(66,204,124,0.07); --green-border:rgba(66,204,124,0.22);
  --red:#E04862; --red-bg:rgba(224,72,98,0.07);
  --blue:#4888E8; --blue-bg:rgba(72,136,232,0.07); --blue-border:rgba(72,136,232,0.22);
  --orange:#E08040; --orange-bg:rgba(224,128,64,0.07); --orange-border:rgba(224,128,64,0.22);
  --gray-bg:rgba(96,104,128,0.08); --gray-border:rgba(96,104,128,0.2);
  --f-display:'Newsreader',Georgia,serif; --f-mono:'JetBrains Mono','Courier New',monospace; --f-ui:'DM Sans',system-ui,sans-serif;
}
html { font-size:14px; }
body { font-family:var(--f-ui); background:var(--bg); color:var(--text); min-height:100vh; }

.nav { position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:50px;background:rgba(8,10,19,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border); }
.nav-brand { font-family:var(--f-display);font-size:1.05rem;color:var(--gold); }
.nav-brand em { font-style:italic; }
.nav-links { display:flex;gap:2px; }
.nav-link { font-size:0.76rem;padding:5px 10px;border-radius:5px;color:var(--text-2);text-decoration:none;transition:0.15s; }
.nav-link:hover { color:var(--text);background:var(--surface-hi); }
.nav-link.active { color:var(--orange);background:var(--orange-bg); }
.nav-right { font-family:var(--f-mono);font-size:0.65rem;color:var(--text-muted); }

.page { max-width:1100px;margin:0 auto;padding:28px 24px 60px; }
.page-hero { margin-bottom:20px; }
.page-hero h1 { font-family:var(--f-display);font-size:1.7rem;font-weight:400; }
.page-hero h1 em { font-style:italic;color:var(--text-2); }
.page-meta { font-family:var(--f-mono);font-size:0.65rem;color:var(--text-2);margin-top:6px; }
.page-tabs { display:flex;gap:2px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border); }
.page-tab { font-family:var(--f-ui);font-size:0.72rem;padding:5px 14px;border-radius:5px;text-decoration:none;color:var(--text-2);border:1px solid transparent;transition:0.15s; }
.page-tab.active { color:var(--text);background:var(--surface-hi);border-color:var(--border-2); }

.section-label { font-family:var(--f-ui);font-size:0.60rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-2);margin:24px 0 12px; }
.chart-wrap { background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:20px;margin-bottom:16px; }
.chart-hd { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px; }
.chart-title { font-family:var(--f-ui);font-size:0.72rem;color:var(--text-2); }
.chart-legend { display:flex;gap:14px; }
.chart-legend-item { display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:0.60rem;color:var(--text-2); }
.chart-legend-dot { width:8px;height:8px;border-radius:50%; }
.chart-legend-line { width:14px;height:2px;border-radius:2px; }

.two-col { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px; }

/* C9 comparison table */
.cmp-table { width:100%;border-collapse:collapse; }
.cmp-table th { font-family:var(--f-ui);font-size:0.58rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);padding:6px 12px;text-align:left;border-bottom:1px solid var(--border-2); }
.cmp-table td { font-family:var(--f-mono);font-size:0.72rem;color:var(--text-2);padding:8px 12px;border-bottom:1px solid var(--border); }
.cmp-table td:first-child { color:var(--text); }
.cmp-table tr:last-child td { border-bottom:none; }
.up { color:var(--green); } .down { color:var(--red); }

.range-btns { display:flex;gap:4px;align-items:center; }
.range-btn { font-family:var(--f-mono);font-size:0.60rem;padding:2px 9px;border-radius:4px;border:1px solid var(--border-2);background:none;color:var(--text-2);cursor:pointer;transition:0.12s; }
.range-btn:hover { color:var(--text);border-color:var(--border-2); }
.range-btn.active { background:var(--surface-hi);color:var(--text);border-color:var(--border-2); }
.loading-msg { font-family:var(--f-ui);font-size:0.72rem;color:var(--text-muted);font-style:italic;padding:40px;text-align:center; }
.error-msg { font-family:var(--f-mono);font-size:0.65rem;color:var(--red);padding:16px; }

@media (max-width:700px) { .two-col { grid-template-columns:1fr; } }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">SPX <em>Strategy</em></span>
  <div class="nav-links">
    <a href="/"                   class="nav-link">Portfolio</a>
    <a href="/spx"                class="nav-link">SPX</a>
    <a href="/es"                 class="nav-link">/ES</a>
    <a href="/q042"               class="nav-link active">Drawdown Overlay</a>
    <a href="/svix"               class="nav-link">Settled VIX</a>
    <a href="/q041"               class="nav-link">Q041</a>
    <a href="/portfolio-backtest" class="nav-link">Port BT</a>
    <a href="/performance"        class="nav-link">Performance</a>
    <a href="/margin"             class="nav-link">Margin</a>
  </div>
  <div class="nav-right" id="nav-date">—</div>
</nav>

<div class="page">

  <div class="page-hero">
    <h1>Q042 <em>Backtest & History</em></h1>
    <div class="page-meta">19yr SPX · Sleeve A (dd4) + Sleeve B (dd15+MA10) · 30 historical triggers</div>
  </div>

  <div class="page-tabs">
    <a href="/q042"          class="page-tab">Dashboard</a>
    <a href="/q042/backtest" class="page-tab active">Backtest</a>
  </div>

  <div id="body-area"><div class="loading-msg">Loading…</div></div>

</div>

<script>
document.getElementById('nav-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

let charts = {};
function destroyCharts() { Object.values(charts).forEach(c => { try { c.destroy(); } catch(_){} }); charts = {}; }
function fmtD(n) {
  if (n==null) return '—';
  const abs=Math.abs(n), sign=n<0?'-':'+';
  return sign+'$'+(abs>=1000?Math.round(abs).toLocaleString():abs.toFixed(0));
}
function fmtDate(s) { return s?s.slice(0,10):'—'; }

// ── Build all charts after data loaded ───────────────────────────────────────
function render(bt, spxHist, paper) {
  const trades  = bt.trades || [];
  const summary = bt.summary || {};
  const history = spxHist.history || [];
  const priceByDate = {};
  const idxByDate = {};
  history.forEach((h, i) => { priceByDate[h.date] = h.close; idxByDate[h.date] = i; });
  const tradesA = trades.filter(t => t.sleeve_id === 'A');
  const tradesB = trades.filter(t => t.sleeve_id === 'B');

  // ── C6: SPX + ATH + entry/exit overlay ─────────────────────────────────────
  // Use numeric index for scatter x so category axis alignment works
  const entryA = [], exitA = [], entryB = [], exitB = [];
  trades.forEach(t => {
    const ei = idxByDate[t.entry_date], xi = idxByDate[t.exit_date];
    const ep = priceByDate[t.entry_date], xp = priceByDate[t.exit_date];
    const bucket = t.sleeve_id === 'A' ? {e:entryA, x:exitA} : {e:entryB, x:exitB};
    if (ei != null && ep != null) bucket.e.push({ x:ei, y:ep, trade:t });
    if (xi != null && xp != null) bucket.x.push({ x:xi, y:xp, trade:t });
  });

  let html = `
    <div class="section-label">C6 · SPX Price + ATH + 入场/出场 Overlay</div>
    <div class="chart-wrap">
      <div class="chart-hd">
        <span class="chart-title">SPX 历史 + ATH 线 + 所有触发标记</span>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div class="chart-legend">
            <div class="chart-legend-item"><div class="chart-legend-line" style="background:#4888E8"></div>SPX</div>
            <div class="chart-legend-item"><div class="chart-legend-line" style="background:rgba(201,168,64,0.6)"></div>ATH</div>
            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#4888E8"></div>A</div>
            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#E08040"></div>B</div>
          </div>
          <div class="range-btns">
            <button class="range-btn" onclick="setC6Range('1yr')">1yr</button>
            <button class="range-btn" onclick="setC6Range('3yr')">3yr</button>
            <button class="range-btn" onclick="setC6Range('5yr')">5yr</button>
            <button class="range-btn" onclick="setC6Range('10yr')">10yr</button>
            <button class="range-btn active" onclick="setC6Range('all')">All</button>
          </div>
        </div>
      </div>
      <canvas id="c6-chart" height="260" style="width:100%"></canvas>
    </div>`;

  // ── C7: Cumulative P&L ──────────────────────────────────────────────────────
  // Build cumulative P&L from trades sorted by entry_date
  const sortedA = [...tradesA].sort((a,b)=>a.entry_date<b.entry_date?-1:1);
  const sortedB = [...tradesB].sort((a,b)=>a.entry_date<b.entry_date?-1:1);
  let cumA=0, cumB=0;
  const pnlA = sortedA.map(t => { cumA+=t.exit_pnl; return {x:t.exit_date, y:Math.round(cumA)}; });
  const pnlB = sortedB.map(t => { cumB+=t.exit_pnl; return {x:t.exit_date, y:Math.round(cumB)}; });

  html += `
    <div class="section-label">C7 · 累计 P&L（Sleeve A + B 各自）</div>
    <div class="chart-wrap">
      <div class="chart-hd">
        <span class="chart-title">Cumulative realized P&L · A 蓝 / B 橙${paper.length ? ' · 虚线=paper' : ''}</span>
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#4888E8"></div>Sleeve A</div>
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#E08040"></div>Sleeve B</div>
        </div>
      </div>
      <canvas id="c7-chart" height="180" style="width:100%"></canvas>
    </div>`;

  // ── C8: ddATH at trigger histogram ──────────────────────────────────────────
  html += `
    <div class="two-col">
      <div class="chart-wrap" style="margin-bottom:0">
        <div class="chart-title" style="margin-bottom:12px">C8 · ddATH% at trigger 分布</div>
        <canvas id="c8-chart" height="180" style="width:100%"></canvas>
      </div>
      <div class="chart-wrap" style="margin-bottom:0">
        <div class="chart-title" style="margin-bottom:12px">C10 · P&L by Year</div>
        <canvas id="c10-chart" height="180" style="width:100%"></canvas>
      </div>
    </div>`;

  // ── C9: Sleeve A vs B comparison ────────────────────────────────────────────
  html += `
    <div class="section-label">C9 · Sleeve A vs B 对比</div>
    <div class="chart-wrap" style="padding:16px 20px">
      <table class="cmp-table">
        <thead><tr><th>Sleeve</th><th>N Trades</th><th>Win Rate</th><th>Avg P&L</th><th>Total P&L</th><th>Worst Trade</th><th>Avg DTE Held</th></tr></thead>
        <tbody>
          ${['A','B'].map(sl => {
            const s = summary[sl];
            if (!s) return `<tr><td>${sl}</td><td colspan="6" style="color:var(--text-muted)">No data</td></tr>`;
            return `<tr>
              <td style="color:${sl==='A'?'var(--blue)':'var(--orange)'};font-weight:600">${sl}</td>
              <td>${s.n}</td>
              <td class="${s.wr>=70?'up':s.wr>=50?'':'down'}">${s.wr.toFixed(1)}%</td>
              <td class="${s.avg_pnl>=0?'up':'down'}">${fmtD(s.avg_pnl)}</td>
              <td class="${s.total_pnl>=0?'up':'down'}">${fmtD(s.total_pnl)}</td>
              <td class="down">${fmtD(s.worst_pnl)}</td>
              <td>${s.avg_dte_held}d</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  // ── C11: BP timeline ────────────────────────────────────────────────────────
  html += `
    <div class="section-label">C11 · BP% Timeline（入场时账户占用）</div>
    <div class="chart-wrap">
      <div class="chart-title" style="margin-bottom:12px">每笔 trade 入场时 account_pct（account_pct = exit_pnl / account_size_approx）</div>
      <canvas id="c11-chart" height="140" style="width:100%"></canvas>
    </div>`;

  document.getElementById('body-area').innerHTML = html;

  // ── Build charts ────────────────────────────────────────────────────────────
  destroyCharts();

  // C6
  const _c6FullData = [
    history.map((h,i)=>({x:i,y:h.close})),
    history.map((h,i)=>({x:i,y:h.ath})),
    entryA, exitA, entryB, exitB,
  ];

  charts.c6 = new Chart(document.getElementById('c6-chart'), {
    type: 'line',
    data: { datasets: [
      { type:'line',    label:'SPX',     data:history.map((h,i)=>({x:i,y:h.close})), borderColor:'#4888E8', backgroundColor:'transparent', borderWidth:1.5, pointRadius:0, tension:0.1, yAxisID:'yP', order:5 },
      { type:'line',    label:'ATH',     data:history.map((h,i)=>({x:i,y:h.ath})),   borderColor:'rgba(201,168,64,0.50)', backgroundColor:'transparent', borderWidth:1, borderDash:[4,3], pointRadius:0, tension:0, yAxisID:'yP', order:4 },
      { type:'scatter', label:'A entry', data:entryA, backgroundColor:'rgba(72,136,232,0.90)', borderColor:'rgba(72,136,232,0.40)', pointStyle:'triangle', rotation:0,   pointRadius:7, yAxisID:'yP', order:1 },
      { type:'scatter', label:'A exit',  data:exitA,  backgroundColor:'rgba(72,136,232,0.50)', borderColor:'rgba(72,136,232,0.25)', pointStyle:'triangle', rotation:180, pointRadius:6, yAxisID:'yP', order:2 },
      { type:'scatter', label:'B entry', data:entryB, backgroundColor:'rgba(224,128,64,0.90)', borderColor:'rgba(224,128,64,0.40)', pointStyle:'triangle', rotation:0,   pointRadius:8, yAxisID:'yP', order:1 },
      { type:'scatter', label:'B exit',  data:exitB,  backgroundColor:'rgba(224,128,64,0.50)', borderColor:'rgba(224,128,64,0.25)', pointStyle:'triangle', rotation:180, pointRadius:7, yAxisID:'yP', order:2 },
    ]},
    options: {
      responsive:true, animation:false,
      plugins: { legend:{display:false}, tooltip:{ callbacks:{
        label: ctx => {
          const t = ctx.raw?.trade;
          if (t) return [`${ctx.dataset.label}  ${fmtDate(t.entry_date)}→${fmtDate(t.exit_date)}`, ` ddATH ${t.ddath_at_signal.toFixed(2)}%`, ` P&L ${fmtD(t.exit_pnl)}`];
          return ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}`;
        }
      }}},
      scales: {
        x: { type:'linear', ticks:{color:'#606880',font:{family:'JetBrains Mono',size:9},maxTicksLimit:14,
               callback:(v)=>{ const d=history[Math.round(v)]?.date; return d?d.slice(0,7):''; }}, grid:{color:'#191E33'} },
        yP: { position:'left', ticks:{color:'#606880',font:{family:'JetBrains Mono',size:10},callback:v=>v.toLocaleString()}, grid:{color:'#191E33'} },
      },
    },
  });

  charts.c6._fullData   = _c6FullData;
  charts.c6._historyRef = history;

  // C7 — cumulative P&L
  charts.c7 = new Chart(document.getElementById('c7-chart'), {
    type:'line',
    data:{ datasets:[
      { label:'Sleeve A', data:pnlA, borderColor:'#4888E8', backgroundColor:'transparent', borderWidth:1.8, pointRadius:3, tension:0.1 },
      { label:'Sleeve B', data:pnlB, borderColor:'#E08040', backgroundColor:'transparent', borderWidth:1.8, pointRadius:3, tension:0.1 },
    ]},
    options:{ responsive:true, animation:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtD(ctx.parsed.y)}`}} },
      scales:{ x:{type:'category',ticks:{color:'#606880',font:{family:'JetBrains Mono',size:10},maxTicksLimit:10,maxRotation:0},grid:{color:'#191E33'}},
        y:{ticks:{color:'#606880',font:{family:'JetBrains Mono',size:10},callback:v=>(v>=0?'+':'')+' $'+Math.round(v).toLocaleString()},grid:{color:'#191E33'}} } },
  });

  // C8 — ddATH histogram
  const ddBins=[-20,-18,-16,-14,-12,-10,-8,-6,-4,-2], ddLabels=ddBins.slice(0,-1).map((b,i)=>`${b}%`);
  ddLabels.push(`${ddBins[ddBins.length-1]}%+`);
  const ddA=new Array(ddBins.length).fill(0), ddB=new Array(ddBins.length).fill(0);
  trades.forEach(t=>{
    const v=t.ddath_at_signal; const arr=t.sleeve_id==='A'?ddA:ddB;
    let placed=false;
    for(let i=0;i<ddBins.length-1;i++) if(v>=ddBins[i]&&v<ddBins[i+1]){arr[i]++;placed=true;break;}
    if(!placed)arr[ddBins.length-1]++;
  });
  charts.c8 = new Chart(document.getElementById('c8-chart'),{
    type:'bar',
    data:{labels:ddLabels,datasets:[
      {label:'A',data:ddA,backgroundColor:'rgba(72,136,232,0.70)',borderRadius:3},
      {label:'B',data:ddB,backgroundColor:'rgba(224,128,64,0.70)',borderRadius:3}]},
    options:{responsive:true,animation:false,
      plugins:{legend:{display:true,labels:{color:'#606880',font:{family:'DM Sans',size:11},boxWidth:10,boxHeight:10}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y} trades`}}},
      scales:{x:{ticks:{color:'#606880',font:{family:'JetBrains Mono',size:9},maxRotation:0},grid:{color:'#191E33'}},
        y:{ticks:{color:'#606880',font:{family:'JetBrains Mono',size:10},stepSize:1},grid:{color:'#191E33'}}}},
  });

  // C10 — P&L by year
  const years={};
  trades.forEach(t=>{
    const yr=t.exit_date.slice(0,4);
    if(!years[yr]) years[yr]={A:0,B:0};
    years[yr][t.sleeve_id]+=t.exit_pnl;
  });
  const yrLabels=Object.keys(years).sort();
  charts.c10 = new Chart(document.getElementById('c10-chart'),{
    type:'bar',
    data:{labels:yrLabels,datasets:[
      {label:'A',data:yrLabels.map(y=>Math.round(years[y].A||0)),backgroundColor:'rgba(72,136,232,0.70)',borderRadius:3},
      {label:'B',data:yrLabels.map(y=>Math.round(years[y].B||0)),backgroundColor:'rgba(224,128,64,0.70)',borderRadius:3}]},
    options:{responsive:true,animation:false,
      plugins:{legend:{display:true,labels:{color:'#606880',font:{family:'DM Sans',size:11},boxWidth:10,boxHeight:10}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtD(ctx.parsed.y)}`}}},
      scales:{x:{stacked:true,ticks:{color:'#606880',font:{family:'JetBrains Mono',size:9},maxRotation:0},grid:{color:'#191E33'}},
        y:{stacked:true,ticks:{color:'#606880',font:{family:'JetBrains Mono',size:10},callback:v=>'$'+Math.round(v).toLocaleString()},grid:{color:'#191E33'}}}},
  });

  // C11 — BP timeline (account_pct %)
  const bpTrades = [...trades].sort((a,b)=>a.signal_date<b.signal_date?-1:1);
  charts.c11 = new Chart(document.getElementById('c11-chart'),{
    type:'scatter',
    data:{datasets:[
      {label:'A',data:tradesA.map(t=>({x:t.signal_date,y:t.account_pct})),backgroundColor:'rgba(72,136,232,0.70)',pointRadius:5},
      {label:'B',data:tradesB.map(t=>({x:t.signal_date,y:t.account_pct})),backgroundColor:'rgba(224,128,64,0.70)',pointRadius:6},
    ]},
    options:{responsive:true,animation:false,
      plugins:{legend:{display:true,labels:{color:'#606880',font:{family:'DM Sans',size:11},boxWidth:10,boxHeight:10}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label} ${fmtDate(ctx.raw.x)}: ${ctx.parsed.y>0?'+':''}${ctx.parsed.y.toFixed(2)}%`}}},
      scales:{x:{type:'category',ticks:{color:'#606880',font:{family:'JetBrains Mono',size:9},maxTicksLimit:10,maxRotation:0},grid:{color:'#191E33'}},
        y:{ticks:{color:'#606880',font:{family:'JetBrains Mono',size:10},callback:v=>(v>0?'+':'')+v.toFixed(1)+'%'},grid:{color:'#191E33'}}}},
  });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
function setC6Range(range) {
  const c = charts.c6;
  if (!c || !c._fullData || !c._historyRef) return;
  const hist = c._historyRef;
  const now = new Date();
  let cutoffDate = null;
  if (range === '1yr')  cutoffDate = new Date(now.getFullYear()-1,  now.getMonth(), now.getDate()).toISOString().slice(0,10);
  else if (range === '3yr')  cutoffDate = new Date(now.getFullYear()-3,  now.getMonth(), now.getDate()).toISOString().slice(0,10);
  else if (range === '5yr')  cutoffDate = new Date(now.getFullYear()-5,  now.getMonth(), now.getDate()).toISOString().slice(0,10);
  else if (range === '10yr') cutoffDate = new Date(now.getFullYear()-10, now.getMonth(), now.getDate()).toISOString().slice(0,10);

  // Find start index in history
  const startIdx = cutoffDate ? Math.max(hist.findIndex(h => h.date >= cutoffDate), 0) : 0;

  // Filter each dataset by index >= startIdx
  c.data.datasets.forEach((ds, i) => {
    const full = c._fullData[i];
    if (!full) return;
    ds.data = startIdx > 0 ? full.filter(p => p.x >= startIdx) : full;
  });
  c.options.scales.x.min = startIdx;
  c.options.scales.x.max = hist.length - 1;
  c.update();

  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ','') === range);
  });
}

async function loadAll() {
  try {
    const [btRes, histRes, paperRes] = await Promise.allSettled([
      fetch('/api/q042/backtest'),
      fetch('/api/q042/spx-history?full=1'),
      fetch('/api/q042/paper'),
    ]);
    const bt   = btRes.status   === 'fulfilled' && btRes.value.ok   ? await btRes.value.json()   : {trades:[],summary:{}};
    const hist = histRes.status === 'fulfilled' && histRes.value.ok ? await histRes.value.json() : {history:[]};
    const paper= paperRes.status=== 'fulfilled' && paperRes.value.ok? await paperRes.value.json(): [];
    if (bt.error) throw new Error(bt.error);
    render(bt, hist, paper);
  } catch(e) {
    document.getElementById('body-area').innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

loadAll();
</script>
